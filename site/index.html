<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Cup 2026 — Teams, Stars & Bracket | chizobao</title>
  <meta name="description" content="An interactive guide to the 2026 FIFA World Cup: all 48 squads, coaches, FIFA ranks, player profiles with badges, group previews and a full bracket prediction." />
  <link rel="preconnect" href="https://media.guim.co.uk" crossorigin />
  <link rel="stylesheet" href="styles.css" />

<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <a class="brand" href="#/home">
        <span class="ball">⚽</span>
        <span class="brand-text">WORLD CUP <b>2026</b></span>
      </a>
      <nav class="tabs" id="tabs">
        <a href="#/home" data-route="home">Overview</a>

      </nav>
      <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>

  <main id="app" class="wrap">

  <footer class="site-footer">
